<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المشاهدة العالمية</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #38bdf8;
            text-align: center;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .card:active {
            transform: scale(0.98);
            border-color: #38bdf8;
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .card-desc {
            font-size: 12px;
            color: #94a3b8;
        }
        .badge {
            background-color: #0284c7;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h1>بوابة المشاهدة السريعة</h1>
    <p>اختر المنصة التي ترغب بمتابعتها بدون إعلانات</p>

    <div class="container">
        <a href="https://a.hitv.cam" class="card">
            <div class="card-icon">📺</div>
            <div class="card-title">منصة HiTV</div>
            <div class="card-desc">المسلسلات والأفلام الآسيوية والعالمية</div>
            <div class="badge">مصفى من الإعلانات</div>
        </a>

        <a href="https://3iskk.xyz" class="card">
            <div class="card-icon">❤️</div>
            <div class="card-title">منصة قصة عشق</div>
            <div class="card-desc">المسلسلات والدراما التركية المترجمة</div>
            <div class="badge">مصفى من الإعلانات</div>
        </a>
    </div>

</body>
</html>
