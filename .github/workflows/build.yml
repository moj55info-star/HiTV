name: Build iOS IPA (Ultimate Anti-Safari & Premium UI)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-Generate Project Files
        run: |
          # 1. بناء ملف الحزم
          cat << 'EOF' > package.json
          {
            "name": "hitv-multi-app",
            "version": "1.1.0",
            "scripts": {
              "build": "echo 'No build step required'"
            },
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

          # 2. الحل الجذري لمنع فتح سفاري: السماح بجميع الروابط والسيرفرات المشغلة للأفلام بداخل التطبيق
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.hitv.multistream",
            "appName": "MultiStream",
            "webDir": "www",
            "server": {
              "allowNavigation": ["*"]
            }
          }
          EOF

          # 3. إنشاء واجهة سينمائية احترافية متجاوبة مع الدوران والشاشات
          mkdir -p www
          cat << 'EOF' > www/index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
              <title>Cinema Hub</title>
              <style>
                  * {
                      box-sizing: border-box;
                      -webkit-tap-highlight-color: transparent;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                      background: radial-gradient(circle at top, #111827 0%, #030712 100%);
                      color: #ffffff;
                      margin: 0;
                      padding: 40px 20px;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      min-height: 100vh;
                  }
                  .header {
                      text-align: center;
                      margin-bottom: 40px;
                  }
                  .header h1 {
                      font-size: 28px;
                      font-weight: 800;
                      background: linear-gradient(to left, #38bdf8, #c084fc);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      margin: 0 0 10px 0;
                      letter-spacing: -0.5px;
                  }
                  .header p {
                      font-size: 14px;
                      color: #9ca3af;
                      margin: 0;
                  }
                  /* نظام شبكي ذكي يتغير حسب تدوير الشاشة تلقائياً */
                  .container {
                      width: 100%;
                      max-width: 850px;
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                      gap: 25px;
                      padding: 10px;
                  }
                  .card {
                      background: rgba(30, 41, 59, 0.4);
                      backdrop-filter: blur(12px);
                      -webkit-backdrop-filter: blur(12px);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      border-radius: 24px;
                      padding: 30px 25px;
                      text-align: center;
                      text-decoration: none;
                      color: white;
                      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                      position: relative;
                      overflow: hidden;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                  }
                  .card::before {
                      content: '';
                      position: absolute;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(192, 132, 252, 0.1) 100%);
                      opacity: 0;
                      transition: opacity 0.3s ease;
                  }
                  .card:active {
                      transform: scale(0.96);
                      border-color: rgba(56, 189, 248, 0.5);
                  }
                  .card:active::before {
                      opacity: 1;
                  }
                  .card-icon {
                      font-size: 48px;
                      margin-bottom: 15px;
                      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
                  }
                  .card-title {
                      font-size: 20px;
                      font-weight: 700;
                      margin-bottom: 8px;
                      letter-spacing: -0.3px;
                  }
                  .card-desc {
                      font-size: 13px;
                      color: #9ca3af;
                      line-height: 1.5;
                      margin-bottom: 15px;
                  }
                  .badge {
                      background: rgba(56, 189, 248, 0.15);
                      color: #38bdf8;
                      border: 1px solid rgba(56, 189, 248, 0.3);
                      font-size: 11px;
                      font-weight: 600;
                      padding: 4px 12px;
                      border-radius: 100px;
                      letter-spacing: 0.5px;
                  }
                  .card.love .badge {
                      background: rgba(239, 68, 68, 0.15);
                      color: #f87171;
                      border: 1px solid rgba(239, 68, 68, 0.3);
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>بوابة المشاهدة الفاخرة</h1>
                  <p>تصفح منصاتك المفضلة كـتطبيق متكامل وبدون إعلانات مزعجة</p>
              </div>
              <div class="container">
                  <a href="https://a.hitv.cam" class="card">
                      <div class="card-icon">📺</div>
                      <div class="card-title">منصة HiTV العالمي</div>
                      <div class="card-desc">عالم المسلسلات والأفلام الآسيوية والإنتاجات الحصرية بجودة عالية.</div>
                      <div class="badge">بيئة محمية</div>
                  </a>
                  <a href="https://3iskk.xyz" class="card love">
                      <div class="card-icon">❤️</div>
                      <div class="card-title">منصة قصة عشق</div>
                      <div class="card-desc">المستودع الأكبر للمسلسلات والدراما التركية المترجمة والحديثة.</div>
                      <div class="badge">بيئة محمية</div>
                  </a>
              </div>
          </body>
          </html>
          EOF

      - name: Install Dependencies
        run: npm install

      - name: Add iOS Platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Inject Anti-Safari Delegate & Advanced AdBlocker
        run: |
          cat << 'EOF' > ios/App/App/ViewController.swift
          import UIKit
          import Capacitor
          import WebKit

          class ViewController: CAPBridgeViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  
                  // كود حقن لمنع المنبثقات وحظر طبقات الإعلانات الشفافة عند الضغط على الأزرار
                  let antiClickjackScript = """
                  window.open = function() { return null; };
                  
                  document.addEventListener('click', function(e) {
                      let targetLink = e.target.closest('a');
                      if (targetLink) {
                          let href = targetLink.getAttribute('href') || '';
                          if (targetLink.target === '_blank' || href.includes('ads') || href.includes('pop') || href.includes('click')) {
                              if (href !== '' && !href.includes(window.location.hostname)) {
                                  e.preventDefault();
                                  e.stopPropagation();
                                  return false;
                              }
                          }
                      }
                  }, true);

                  setInterval(function() {
                      document.querySelectorAll('div').forEach(div => {
                          let style = window.getComputedStyle(div);
                          if (style.position === 'fixed' && parseInt(style.zIndex) > 500 && div.id !== 'cap-home-btn') {
                              if (div.innerText.trim() === '') { div.remove(); }
                          }
                      });

                      const adSelectors = [
                          'iframe[src*="ads"]', 'iframe[src*="pop"]', 'div[class*="ad-"]', 
                          'div[id*="ad-"]', '.adsbox', '#ad-container', '.native-ad', 
                          'div[class*="popup"]', 'div[id*="popup"]', 'div[class*="banner"]',
                          '[id^="popunder"]', '[class^="popunder"]', 'a[href*="click"]'
                      ];
                      adSelectors.forEach(selector => {
                          document.querySelectorAll(selector).forEach(el => el.remove());
                      });
                  }, 400);

                  if (!document.getElementById('cap-home-btn') && window.location.href.indexOf('capacitor://localhost') === -1) {
                      let btn = document.createElement('div');
                      btn.id = 'cap-home-btn';
                      btn.innerHTML = '🏠';
                      btn.style.position = 'fixed';
                      btn.style.bottom = '40px';
                      btn.style.left = '25px';
                      btn.style.width = '55px';
                      btn.style.height = '55px';
                      btn.style.backgroundColor = 'rgba(15, 23, 42, 0.8)';
                      btn.style.color = '#38bdf8';
                      btn.style.border = '1px solid rgba(56, 189, 248, 0.3)';
                      btn.style.backdropFilter = 'blur(10px)';
                      btn.style.webkitBackdropFilter = 'blur(10px)';
                      btn.style.borderRadius = '50%';
                      btn.style.textAlign = 'center';
                      btn.style.lineHeight = '53px';
                      btn.style.fontSize = '24px';
                      btn.style.zIndex = '999999';
                      btn.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
                      btn.style.cursor = 'pointer';
                      btn.style.userSelect = 'none';
                      btn.style.webkitUserSelect = 'none';
                      
                      btn.onclick = function() {
                          window.location.href = 'capacitor://localhost/index.html';
                      };
                      document.body.appendChild(btn);
                  }
                  """
                  
                  let userScript = WKUserScript(source: antiClickjackScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  self.webView?.configuration.userContentController.addUserScript(userScript)
              }
          }
          EOF

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/App/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA File
        run: |
          mkdir Payload
          cp -r ios/App/App.xcarchive/Products/Applications/App.app Payload/
          zip -r HiTV.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiTV-iOS-IPA
          path: HiTV.ipa
